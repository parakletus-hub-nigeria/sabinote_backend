# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - sabinotebackend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install all dependencies and build
        run: |
          npm install
          npx prisma generate
          npm run build

      - name: Verify dist was created
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== dist/main.js check ==="
          ls -la dist/main.js

      - name: Prune to production dependencies only
        run: npm prune --production

      - name: Copy spec and prompt files into dist
        run: |
          cp sabinote_lesson_note_spec.md dist/ 2>/dev/null || true

      - name: Zip deployment package
        run: |
          zip -r deploy.zip dist/ node_modules/ package.json
          echo "=== Verifying zip contains dist/main.js ==="
          unzip -l deploy.zip | grep "dist/main"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app



      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sabinotebackend'
          slot-name: 'Production'
          package: deploy.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2B2443D37BE247A4B63AEA814B009C43 }}